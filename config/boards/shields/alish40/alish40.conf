# USB 장치 이름 설정
CONFIG_ZMK_KEYBOARD_NAME="alish40"

# HID(키보드) 리포트 활성화
CONFIG_ZMK_USB=y

# --- ZMK Studio 설정 ---
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

# --- 기타 설정 ---
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n

# 1. 일정 시간 입력이 없으면 LED를 먼저 끕니다 (밀리초 단위, 30초)
CONFIG_ZMK_IDLE_TIMEOUT=30000
# 2. 깊은 절전 모드(Deep Sleep) 활성화
CONFIG_ZMK_SLEEP=y
# 3. 15분(900,000ms) 동안 입력이 없으면 Deep Sleep 진입
# 이 상태에서는 아무 키나 누르면 다시 깨어납니다! (중요)
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# --- RGB Underglow 설정 ---
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_LED_STRIP=y

# RGB 하위 설정들
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_USB=y
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=1
