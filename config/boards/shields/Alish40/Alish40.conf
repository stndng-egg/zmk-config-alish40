CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n

CONFIG_ZMK_IDLE_TIMEOUT=30000

CONFIG_ZMK_PM_SOFT_OFF=y

CONFIG_ZMK_RGB_UNDERGLOW=n
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_USB=y
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=1
# Use the STRIP config specific to the LEDs you're using
CONFIG_WS2812_STRIP=y

# --- ZMK Studio 설정 추가 ---
# ZMK Studio 기능을 활성화합니다.
CONFIG_ZMK_STUDIO=y

# 보안 잠금을 비활성화하여 연결 즉시 키맵을 수정할 수 있게 합니다.
# (이 옵션이 없으면 키보드에서 'Unlock' 키를 입력해야 수정이 가능합니다.)
CONFIG_ZMK_STUDIO_LOCKING=n

# 배터리 효율을 위해 블루투스 출력을 높게 설정하신 것과 충돌하지 않도록
# Studio 관련 데이터 통신을 안정화합니다.
