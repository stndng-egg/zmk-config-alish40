name: Build
on:
  - push
  - pull_request
  - workflow_dispatch

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    strategy:
      fail-fast: false
      matrix:
        include:
          # 1. 보드는 nice_nano_v2, 쉴드는 alish40으로 설정합니다.
          - board: nice_nano_v2
            shield: alish40
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # v6 대신 안정적인 v4 권장
      - name: Cache west modules
        uses: actions/cache@v4 # v5 대신 안정적인 v4 권장
        env:
          cache-name: cache-zephyr-modules
        with:
          path: |
            bootloader/
            modules/
            tools/
            zephyr/
            zmk/
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('config/west.yml') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-
        timeout-minutes: 2
        continue-on-error: true
      - name: Initialize workspace (west init)
        run: west init -l config
      - name: Update modules (west update)
        run: west update
      - name: Export Zephyr CMake package (west zephyr-export)
        run: west zephyr-export
      - name: Prepare variables
        id: variables
        run: |
          if [ -n "${{ matrix.shield }}" ]; then
            SHIELD_ARG="-DSHIELD=${{ matrix.shield }}"
            ARTIFACT_NAME="${{ matrix.shield }}-${{ matrix.board }}-zmk"
          else
            SHIELD_ARG=
            ARTIFACT_NAME="${{ matrix.board }}-zmk"
          fi
          echo "shield-arg=${SHIELD_ARG}" >> $GITHUB_OUTPUT
          echo "artifact-name=${ARTIFACT_NAME}" >> $GITHUB_OUTPUT
      - name: Build (west build)
        run: |
          # 2. -b 옵션에 matrix에서 정의한 보드와 쉴드 변수를 사용합니다.
          west build -s zmk/app -b ${{ matrix.board }} -- \
          ${{ steps.variables.outputs.shield-arg }} \
          -DZMK_CONFIG="${GITHUB_WORKSPACE}/config" \
          -DCONFIG_ZMK_STUDIO=y \
          -DSNIPPET=studio-rpc-usb-uart
      - name: Archive artifacts
        uses: actions/upload-artifact@v4 # v7 대신 안정적인 v4 권장
        with:
          name: ${{ steps.variables.outputs.artifact-name }}
          path: |
            build/zephyr/zmk.hex
            build/zephyr/zmk.uf2
        continue-on-error: true
